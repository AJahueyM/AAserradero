name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    name: Backend (build + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: Restore
        run: dotnet restore AntiguoAserradero.slnx
      - name: Build
        run: dotnet build AntiguoAserradero.slnx --configuration Release --no-restore
      - name: Test
        run: dotnet test AntiguoAserradero.slnx --configuration Release --no-build --verbosity normal

  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/Web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: src/Web/package-lock.json
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build

  infra:
    name: Infrastructure (bicep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Bicep build
        run: az bicep build --file infra/bicep/main.bicep
      - name: Bicep lint
        run: az bicep lint --file infra/bicep/main.bicep
